<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Family Caregiver Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2c6d48",
                        "background-light": "#f6f7f7",
                        "background-dark": "#151d18",
                        "text-light": "#111814",
                        "text-muted": "#5f8670",
                        "border-color": "#eaf0ed",
                        "accent": "#d5e1da"
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                        "serif": ["Georgia", "serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-text-light dark:text-slate-100 min-h-screen flex justify-center">
<div class="w-full max-w-md bg-[#fdfbf7] dark:bg-background-dark relative flex h-full min-h-screen flex-col group/design-root overflow-x-hidden shadow-2xl">
<!-- Header -->
<div class="flex items-center p-4 pb-2 justify-between sticky top-0 bg-[#fdfbf7]/90 dark:bg-background-dark/90 backdrop-blur-sm z-10 border-b border-border-color dark:border-gray-800">
<h2 class="text-text-light dark:text-slate-100 text-2xl font-bold leading-tight tracking-tight flex-1 text-center font-serif">Family Dashboard</h2>
</div>
<!-- Profile Tabs -->
<div class="pb-3 sticky top-[53px] bg-[#fdfbf7] dark:bg-background-dark z-10 shadow-sm">
<div class="flex border-b border-border-color dark:border-gray-800 px-4 gap-8 overflow-x-auto no-scrollbar">
<!-- Active Tab -->
<a class="flex flex-col items-center justify-center border-b-[3px] border-primary text-text-light dark:text-slate-100 gap-2 pb-[7px] pt-4 min-w-[70px]" href="#">
<div class="bg-primary/10 text-primary flex items-center justify-center rounded-full size-12 font-bold text-lg ring-2 ring-primary ring-offset-2 ring-offset-[#fdfbf7] dark:ring-offset-background-dark">
                    A
                </div>
<p class="text-sm font-bold leading-normal tracking-wide">Ahmad (You)</p>
</a>
<!-- Inactive Tab -->
<a class="flex flex-col items-center justify-center border-b-[3px] border-transparent text-text-muted dark:text-gray-400 gap-2 pb-[7px] pt-4 min-w-[70px] hover:text-text-light dark:hover:text-slate-200 transition-colors" href="#">
<div class="bg-accent/50 dark:bg-gray-800 flex items-center justify-center rounded-full size-12 font-semibold text-lg">
                    F
                </div>
<p class="text-sm font-medium leading-normal tracking-wide">Father</p>
</a>
<!-- Add Tab -->
<a class="flex flex-col items-center justify-center border-b-[3px] border-transparent text-text-muted dark:text-gray-400 gap-2 pb-[7px] pt-4 min-w-[70px] hover:text-primary transition-colors" href="#">
<div class="border-2 border-dashed border-text-muted/50 dark:border-gray-600 flex items-center justify-center rounded-full size-12">
<span class="material-symbols-outlined text-text-muted dark:text-gray-400">add</span>
</div>
<p class="text-sm font-medium leading-normal tracking-wide">Add</p>
</a>
</div>
</div>
<!-- Main Content -->
<div class="flex-1 overflow-y-auto pb-24">
<!-- Profile Info Card -->
<div class="p-4">
<div class="flex items-center gap-4 rounded-xl bg-white dark:bg-gray-900 p-5 shadow-sm border border-border-color dark:border-gray-800">
<div class="bg-primary/10 text-primary flex items-center justify-center rounded-full size-16 font-bold text-2xl">
                    A
                </div>
<div class="flex flex-col gap-1 flex-1">
<p class="text-text-light dark:text-slate-100 text-lg font-bold leading-tight font-serif">Ahmad (You)</p>
<p class="text-text-muted dark:text-gray-400 text-sm font-medium leading-normal flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">admin_panel_settings</span>
                        Primary Caregiver
                    </p>
</div>
</div>
</div>
<!-- Adherence Section -->
<div class="flex flex-col gap-4 p-4">
<h3 class="font-serif font-bold text-lg text-text-light dark:text-slate-100 mb-2">Medication Adherence</h3>
<!-- Progress Card -->
<div class="bg-white dark:bg-gray-900 rounded-xl p-5 shadow-sm border border-border-color dark:border-gray-800 flex flex-col gap-4">
<div class="flex gap-6 justify-between items-end">
<div>
<p class="text-text-muted dark:text-gray-400 text-sm font-medium mb-1">Weekly Progress</p>
<p class="text-text-light dark:text-slate-100 text-3xl font-bold font-serif">80%</p>
</div>
<span class="material-symbols-outlined text-primary text-3xl fill">task_alt</span>
</div>
<div class="rounded-full bg-accent dark:bg-gray-800 h-2.5 overflow-hidden">
<div class="h-full rounded-full bg-primary transition-all duration-500 ease-out" style="width: 80%;"></div>
</div>
<div class="flex items-center gap-2 mt-2 pt-4 border-t border-border-color dark:border-gray-800">
<span class="material-symbols-outlined text-text-muted dark:text-gray-400 text-sm">schedule</span>
<p class="text-text-muted dark:text-gray-400 text-sm font-medium">Next due dose: <strong class="text-text-light dark:text-slate-200">8:00 AM</strong></p>
</div>
</div>
<!-- Quick Actions -->
<div class="mt-4 grid grid-cols-2 gap-4">
<button class="flex flex-col items-center justify-center p-4 bg-white dark:bg-gray-900 rounded-xl shadow-sm border border-border-color dark:border-gray-800 gap-2 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">
<span class="material-symbols-outlined text-primary text-2xl">history</span>
<span class="text-sm font-medium text-text-light dark:text-slate-200">History</span>
</button>
<button class="flex flex-col items-center justify-center p-4 bg-white dark:bg-gray-900 rounded-xl shadow-sm border border-border-color dark:border-gray-800 gap-2 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">
<span class="material-symbols-outlined text-primary text-2xl">pill</span>
<span class="text-sm font-medium text-text-light dark:text-slate-200">Medications</span>
</button>
</div>
</div>
<!-- Invite Button -->
<div class="p-4 mt-2">
<button class="w-full flex items-center justify-center gap-2 bg-primary/10 hover:bg-primary/20 text-primary dark:text-primary dark:bg-primary/20 dark:hover:bg-primary/30 py-3.5 px-6 rounded-xl font-bold text-base transition-colors border border-primary/20">
<span class="material-symbols-outlined">person_add</span>
                Invite family member
            </button>
</div>
<div class="h-5"></div>
</div>
<!-- Bottom Nav Bar -->
<div class="absolute bottom-0 left-0 right-0 flex gap-2 border-t border-border-color dark:border-gray-800 bg-[#fdfbf7]/95 dark:bg-background-dark/95 backdrop-blur-md px-4 pb-safe pt-2 z-20" style="padding-bottom: max(env(safe-area-inset-bottom), 12px);">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-text-muted dark:text-gray-400 hover:text-primary dark:hover:text-primary transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">home</span>
</div>
<p class="text-xs font-medium tracking-wide">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary dark:text-primary" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined fill">group</span>
</div>
<p class="text-xs font-bold tracking-wide">Family</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-text-muted dark:text-gray-400 hover:text-primary dark:hover:text-primary transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">settings</span>
</div>
<p class="text-xs font-medium tracking-wide">Settings</p>
</a>
</div>
</div>
</body></html>
